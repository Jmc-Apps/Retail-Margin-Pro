<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#101826">
  <title>Retail Margin Pro</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <img src="assets/title-logo.png" class="title-logo" alt="Retail Margin Pro">
      <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
    </header>

    <main class="calc-panel">
      <button class="calc-row row-cost active" type="button" data-field="cost">
        <span class="field-icon cost-icon">🔒</span><span class="row-label">Cost</span>
        <span id="costDisplay" class="row-value">0.00</span>
        <span class="row-actions">
          <span id="costLockBtn" class="mini-icon" aria-label="Lock Cost Price">🔓</span>
          <span id="costVatBtn" class="mini-pill">VAT</span>
        </span>
      </button>
        <button class="calc-row row-gp" type="button" data-field="gp">
        <span class="field-icon gp-icon">%</span><span class="row-label">GP%</span>
        <span class="gp-value-stack"><span id="gpDisplay" class="row-value">0.00</span><span id="gpDeptName" class="gp-dept-name"></span></span>
        <span class="row-actions">
          <span id="deptBtn" class="mini-pill">Dept</span>
        </span>
      </button>
        <button class="calc-row row-rands" type="button" data-field="rands">
        <span class="field-icon rands-icon">R</span><span class="row-label">GP Rands</span>
        <span id="randsDisplay" class="row-value">0.00</span>
        <span class="row-actions"></span>
      </button>
        <button class="calc-row row-sell" type="button" data-field="sell">
        <span class="field-icon sell-icon">🏷</span><span class="row-label">Sell</span>
        <span id="sellDisplay" class="row-value">0.00</span>
        <span class="row-actions">
          <span id="sellVatBtn" class="mini-pill">VAT</span>
        </span>
      </button>

      <section class="info-strip">
        <div id="markupText">Markup: N/C</div>
        <div id="statusText">Active Field: Cost</div>
      </section>
    </main>

    <section class="keypad" aria-label="Number keypad">
      <button data-key="7" class="key-7">7</button>
      <button data-key="8" class="key-8">8</button>
      <button data-key="9" class="key-9">9</button>
      <button data-action="back" class="danger-key key-back">⌫</button>

      <button data-key="4" class="key-4">4</button>
      <button data-key="5" class="key-5">5</button>
      <button data-key="6" class="key-6">6</button>
      <button data-action="clear-field" class="danger-key key-clear">C</button>

      <button data-key="1" class="key-1">1</button>
      <button data-key="2" class="key-2">2</button>
      <button data-key="3" class="key-3">3</button>
      <button data-action="sign" class="utility-key key-sign">±</button>

      <button data-key="0" class="key-0">0</button>
      <button data-key="." class="key-dot">.</button>

      <button data-op="+" class="op-key plus key-plus">+</button>
      <button data-op="-" class="op-key minus key-minus">−</button>
      <button data-op="*" class="op-key multiply key-multiply">×</button>
      <button data-op="/" class="op-key divide key-divide">÷</button>
      <button data-action="equals" class="op-key equals key-equals">=</button>
    </section>
  </div>

  <dialog id="deptDialog" class="modal">
    <div class="modal-head"><h2>Select Department</h2><button class="close" data-close="deptDialog">×</button></div>
    <div id="deptChoices" class="list"></div>
  </dialog>

  <dialog id="settingsDialog" class="modal settings-modal">
    <div class="modal-head"><h2>Settings</h2><button class="close" data-close="settingsDialog">×</button></div>
    <div class="settings-scroll">
      <section class="setting-section">
        <label for="vatRateInput">VAT Rate %</label>
        <input id="vatRateInput" inputmode="decimal" type="text" placeholder="15.00">
      </section>

      <section class="setting-section">
        <h3>Departments</h3>
        <div id="departmentList" class="list"></div>
        <div class="dept-editor">
          <input id="deptNameInput" type="text" placeholder="Department name">
          <input id="deptGpInput" inputmode="decimal" type="text" placeholder="GP %">
          <button id="addDeptBtn" class="primary" type="button">Add Department</button>
        </div>
      </section>

      <section class="setting-section">
        <h3>Backup & Restore</h3>
        <div class="actions stacked">
          <button id="exportBtn" type="button">Export Settings</button>
          <button id="importBtn" type="button">Import Settings</button>
          <input id="importFile" type="file" accept="application/json,.json" hidden>
        </div>
      </section>

      
      <section class="setting-section update-info">
        <h3>Updates</h3>
        <div class="update-card">
          <button id="checkUpdatesBtn" type="button">Force Reload from Server</button>
          <span id="updateStatus">Reloads the latest hosted files from the server.</span>
        </div>
      </section>

      <section class="setting-section version-info">
        <h3>Version Information</h3>
        <div class="version-card">
          <strong>Retail Margin Pro</strong>
          <span>Version: v2.17</span>
        </div>
      </section>

      <button id="saveSettingsBtn" class="primary full" type="button">Save Settings</button>
    </div>
  </dialog>
  <script src="app.js"></script>
</body>
</html>
